name: Go Build & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            cc: gcc
            artifact_name: tg-file-url-linux-amd64
            output_name: tg-file-url-linux-amd64
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
            artifact_name: tg-file-url-linux-arm64
            output_name: tg-file-url-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ARM64 cross compiler
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Download modules
        run: go mod download

      - name: Build binary
        env:
          CC: ${{ matrix.cc }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH="$GOARCH" CC="$CC" go build -v -o "dist/${{ matrix.output_name }}" ./cmd/filetolink

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.output_name }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tg-file-url-linux-*
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "Automated release for $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber
